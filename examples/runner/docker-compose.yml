services:
  registry:
    image: registry:2
    environment:
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
    volumes:
      - registry_data:/var/lib/registry

  runner:
    image: ghcr.io/icholy/xagent-runner:latest
    env_file: .env
    environment:
      XAGENT_SERVER: https://xagent.choly.ca
      # Create an API key at https://xagent.choly.ca/ui/keys
      XAGENT_API_KEY: ${XAGENT_API_KEY}
      XAGENT_CONFIG_DIR: /etc/xagent
      XAGENT_RUNNER_ID: example-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/etc/xagent
      - /tmp/xagent:/tmp/xagent
    depends_on:
      - registry

volumes:
  registry_data:
