services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: xagent
      POSTGRES_PASSWORD: xagent
      POSTGRES_DB: xagent
      PGPORT: "5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xagent -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/icholy/xagent-server:latest
    command: ["./xagent", "server", "--no-auth"]
    ports:
      - "6464:6464"
    env_file: .env
    environment:
      XAGENT_BASE_URL: http://localhost:6464
      XAGENT_DATABASE_URL: postgres://xagent:xagent@postgres:5433/xagent?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
