services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: xagent
      POSTGRES_PASSWORD: xagent
      POSTGRES_DB: xagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
