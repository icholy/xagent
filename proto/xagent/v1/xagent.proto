syntax = "proto3";

package xagent.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/icholy/xagent/internal/proto/xagent/v1;xagentv1";

service XAgentService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc ListRunnerTasks(ListRunnerTasksRequest) returns (ListRunnerTasksResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc ArchiveTask(ArchiveTaskRequest) returns (ArchiveTaskResponse);
  rpc UnarchiveTask(UnarchiveTaskRequest) returns (UnarchiveTaskResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc RestartTask(RestartTaskRequest) returns (RestartTaskResponse);
  rpc OpenShell(OpenShellRequest) returns (OpenShellResponse);
  rpc UploadLogs(UploadLogsRequest) returns (UploadLogsResponse);
  rpc CreateLink(CreateLinkRequest) returns (CreateLinkResponse);
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse);
  rpc ListExternalEvents(ListExternalEventsRequest) returns (ListExternalEventsResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  rpc ListEventsByTask(ListEventsByTaskRequest) returns (ListEventsByTaskResponse);
  rpc SubmitRunnerEvents(SubmitRunnerEventsRequest) returns (SubmitRunnerEventsResponse);
  rpc CreateTaskToken(CreateTaskTokenRequest) returns (CreateTaskTokenResponse);
  rpc RegisterWorkspaces(RegisterWorkspacesRequest) returns (RegisterWorkspacesResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc ClearWorkspaces(ClearWorkspacesRequest) returns (ClearWorkspacesResponse);
  rpc CreateKey(CreateKeyRequest) returns (CreateKeyResponse);
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);
  rpc DeleteKey(DeleteKeyRequest) returns (DeleteKeyResponse);
  rpc UnlinkGitHubAccount(UnlinkGitHubAccountRequest) returns (UnlinkGitHubAccountResponse);
  rpc LinkGitHubInstallation(LinkGitHubInstallationRequest) returns (LinkGitHubInstallationResponse);
  rpc UnlinkAtlassianAccount(UnlinkAtlassianAccountRequest) returns (UnlinkAtlassianAccountResponse);
  rpc CreateOrg(CreateOrgRequest) returns (CreateOrgResponse);
  rpc ListOrgs(ListOrgsRequest) returns (ListOrgsResponse);
  rpc DeleteOrg(DeleteOrgRequest) returns (DeleteOrgResponse);
  rpc AddOrgMember(AddOrgMemberRequest) returns (AddOrgMemberResponse);
  rpc RemoveOrgMember(RemoveOrgMemberRequest) returns (RemoveOrgMemberResponse);
  rpc ListOrgMembers(ListOrgMembersRequest) returns (ListOrgMembersResponse);
  rpc GetOrgSettings(GetOrgSettingsRequest) returns (GetOrgSettingsResponse);
  rpc GenerateAtlassianWebhookSecret(GenerateAtlassianWebhookSecretRequest) returns (GenerateAtlassianWebhookSecretResponse);
  rpc GetRoutingRules(GetRoutingRulesRequest) returns (GetRoutingRulesResponse);
  rpc SetRoutingRules(SetRoutingRulesRequest) returns (SetRoutingRulesResponse);
  rpc GetEventTypes(GetEventTypesRequest) returns (GetEventTypesResponse);
  rpc TestEvent(TestEventRequest) returns (TestEventResponse);
  rpc CreateGitHubToken(CreateGitHubTokenRequest) returns (CreateGitHubTokenResponse);
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc SetScheduleEnabled(SetScheduleEnabledRequest) returns (SetScheduleEnabledResponse);
}

message PingRequest {}

message PingResponse {
  string version = 1;
}

message Instruction {
  string text = 1;
  string url = 2;
}

message TaskActions {
  bool archive = 1;
  bool cancel = 2;
  bool restart = 3;
  bool start = 4;
  bool unarchive = 5;
}

enum TaskStatus {
  UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  RESTARTING = 3;
  CANCELLING = 4;
  COMPLETED = 5;
  FAILED = 6;
  CANCELLED = 7;
}

enum TaskCommand {
  NONE = 0;
  RESTART = 1;
  STOP = 2;
  START = 3;
}

message Task {
  int64 id = 1;
  string name = 2;
  reserved 3;  // Previously: parent (child tasks removed)
  string workspace = 4;
  string runner = 5;  // Runner ID that handles this task
  reserved 6;  // Previously: instructions (now instruction events in the stream)
  TaskStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  TaskCommand command = 10;
  int64 version = 11;  // Incremented when command changes
  TaskActions actions = 12;
  bool archived = 13;
  string url = 14;
  // Auto-archive this task once it has been in a terminal status
  // (COMPLETED, FAILED, CANCELLED) for this long.
  //   zero (or unset): never auto-archive (default)
  //   negative:        archive immediately on terminal status
  //   positive:        archive that long after reaching terminal status
  google.protobuf.Duration auto_archive = 15;
  // Non-empty => this sandbox run is a reverse shell for this rendezvous
  // session id (see proposals/draft/driver-reverse-shell.md). Empty => normal
  // agent run. Persistent and server-owned; the runner never touches it.
  string shell_session = 16;
  // Namespace partitions subscription matching in the event router. Empty is
  // the default namespace — the behavior every existing task already has. Set
  // at creation and read-only thereafter (see
  // proposals/draft/task-namespaces.md).
  string namespace = 17;
}

message McpServer {
  string name = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;
}

message Profile {
  string id = 1;
  string email = 2;
  string name = 3;
}

message GetProfileRequest {}

message GetProfileResponse {
  Profile profile = 1;
  repeated Org orgs = 2;
  int64 default_org_id = 3;
  GitHubAccount github_account = 4;
  AtlassianAccount atlassian_account = 5;
}

message ListTasksRequest {
  int32 page_size = 1;     // Max tasks to return (default: 50, max: 100)
  string page_token = 2;   // Opaque cursor from a previous next_page_token; empty for the first page
  bool archived = 3;       // Include archived tasks alongside active ones (default: false)
}

message ListTasksResponse {
  repeated Task tasks = 1;
  string next_page_token = 2;  // Token for the next page; empty when there are no more results
}

message ListRunnerTasksRequest {
  string runner = 1;  // Runner ID (required)
}

message ListRunnerTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  string name = 1;
  reserved 2;  // Previously: parent (child tasks removed)
  string workspace = 3;
  repeated Instruction instructions = 4;
  string runner = 5;  // Runner ID that should handle this task
  google.protobuf.Duration auto_archive = 6;
  // Optional namespace for the created task. Empty (default) is the default
  // namespace. See Task.namespace.
  string namespace = 7;
}

message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  int64 id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message UpdateTaskRequest {
  int64 id = 1;
  string name = 2;
  reserved 3;  // Previously: restart
  repeated Instruction add_instructions = 4;
  bool start = 5;    // Start after current run finishes (non-interrupting)
  // Unset = leave alone. See Task.auto_archive for the value semantics
  // (zero = never, negative = immediate, positive = delay).
  google.protobuf.Duration auto_archive = 6;
}

message UpdateTaskResponse {}

message ArchiveTaskRequest {
  int64 id = 1;
}

message ArchiveTaskResponse {}

message UnarchiveTaskRequest {
  int64 id = 1;
}

message UnarchiveTaskResponse {}

message CancelTaskRequest {
  int64 id = 1;
}

message CancelTaskResponse {}

message RestartTaskRequest {
  int64 id = 1;
}

message RestartTaskResponse {}

message OpenShellRequest {
  int64 task_id = 1;
}

message OpenShellResponse {
  // session_id is the rendezvous id the operator connects to via
  // GET /shell/{session_id}/attach. It is also written to the task's
  // shell_session field so the re-spawned driver serves this session.
  string session_id = 1;
}

message LogEntry {
  string type = 1;
  string content = 2;
  google.protobuf.Timestamp created_at = 3;
}

message UploadLogsRequest {
  int64 task_id = 1;
  repeated LogEntry entries = 2;
}

message UploadLogsResponse {}

message TaskLink {
  int64 id = 1;
  int64 task_id = 2;
  string relevance = 3;
  string url = 4;
  string title = 5;
  bool subscribe = 6;
  google.protobuf.Timestamp created_at = 7;
  // routing_key is a read-only routing key derived from url by the server.
  string routing_key = 8;
}

message CreateLinkRequest {
  int64 task_id = 1;
  string relevance = 2;
  string url = 3;
  string title = 4;
  bool subscribe = 5;
  reserved 6;
}

message CreateLinkResponse {
  TaskLink link = 1;
}

message ListLinksRequest {
  int64 task_id = 1;
}

message ListLinksResponse {
  repeated TaskLink links = 1;
}

message Event {
  int64 id = 1;
  int64 task_id = 2;
  bool wake = 3;
  google.protobuf.Timestamp created_at = 4;
  // The set arm IS the event type — a typed union, not an opaque Struct. There
  // is no separate `type` field on the wire; the db `type` column is
  // materialized from the arm for indexed filtering (like `direction`). All five
  // arms are wired (see proposals/draft/unified-task-event-stream.md).
  oneof payload {
    InstructionPayload instruction = 5;
    ExternalPayload external = 6;
    ReportPayload report = 7;
    LifecyclePayload lifecycle = 8;
    LinkPayload link = 9;
  }
}

// InstructionPayload is a to-agent instruction — the stream replacement for the
// old tasks.instructions JSON column. Kept minimal (parity with the stored
// instruction); no actor, consistent with the external-only trimming in #957.
message InstructionPayload {
  string text = 1;
  string url = 2;
}

message ExternalPayload {
  string description = 1;
  string url = 2;
  string data = 3;
  // details carries optional, source-defined key/value context for consumers
  // (the agent via get_my_task, the web UI timeline). The payload does not
  // interpret it: GitHub review comments populate path/line/side/diff_hunk; other
  // sources may set their own keys or none. Distinct from the router's matchable
  // Attrs, which are not persisted.
  map<string, string> details = 4;
  // source is the coarse origin of the event (e.g. "github", "jira"), copied
  // from the router's InputEvent.Source. Persisting it lets consumers pick an
  // icon/label without regexing the URL.
  string source = 5;
  // type is the fine-grained event type (e.g. "issue_comment",
  // "pull_request_review"), copied from the router's InputEvent.Type. It
  // distinguishes comment vs review vs assigned, which the URL cannot.
  string type = 6;
}

// ReportPayload is the body of a report event — a from-agent message written by
// the agent's `report` tool. It is the stream replacement for the old logs rows
// with type='llm'. Reports are not to-agent, so they never enter the brief.
message ReportPayload {
  string content = 1;
}

// LinkPayload is the body of a link event — an about-task record of a link the
// task created (a PR, issue, etc.). The link event is the timeline source of
// truth; the task_links row it mirrors is the subscription/list projection.
// link_id is the task_links row id.
message LinkPayload {
  int64 link_id = 1;
  string relevance = 2;
  string url = 3;
  string title = 4;
  bool subscribe = 5;
}

// LifecyclePayload is the body of a lifecycle event — an about-task record of a
// transition that happened to the task (created, cancelled, sandbox exited, …).
// It is the stream replacement for the old logs rows with type='audit'/'info'
// and the type='error' container-failure rows. Lifecycle events sit beside the
// existing status mutation in the same transaction; status stays a materialized
// projection (see proposals/draft/unified-task-event-stream.md "Status stays a
// projection"). `message` carries the failure detail for SANDBOX_FAILED and is
// empty for kinds that don't need it. `fields` lists the task fields that
// changed for LIFECYCLE_KIND_UPDATED (e.g. "name", "status") and is empty for
// other kinds.
message LifecyclePayload {
  LifecycleKind kind = 1;
  Actor actor = 2;
  string from_status = 3;
  string to_status = 4;
  string message = 5;
  repeated string fields = 6;
}

// Actor identifies who caused a lifecycle event. kind is one of user, runner,
// or router; name is the human-readable name for user actors (empty for the
// server-internal runner/router actors).
message Actor {
  string kind = 1;
  string name = 2;
}

// LifecycleKind is the closed set of lifecycle transitions (the TaskChange set,
// minus Woken — which splits into an external event plus the transition the
// wake caused).
enum LifecycleKind {
  LIFECYCLE_KIND_UNSPECIFIED = 0;
  LIFECYCLE_KIND_CREATED = 1;
  LIFECYCLE_KIND_UPDATED = 2;
  LIFECYCLE_KIND_CANCELLED = 3;
  LIFECYCLE_KIND_RESTARTED = 4;
  LIFECYCLE_KIND_ARCHIVED = 5;
  LIFECYCLE_KIND_UNARCHIVED = 6;
  LIFECYCLE_KIND_AUTO_ARCHIVED = 7;
  LIFECYCLE_KIND_SANDBOX_STARTED = 8;
  LIFECYCLE_KIND_SANDBOX_EXITED = 9;
  LIFECYCLE_KIND_SANDBOX_FAILED = 10;
}

message ListExternalEventsRequest {
  int32 limit = 1;  // Max events to return (default: 100, max: 100)
}

message ListExternalEventsResponse {
  repeated Event events = 1;
}

message GetEventRequest {
  int64 id = 1;
}

message GetEventResponse {
  Event event = 1;
}

message DeleteEventRequest {
  int64 id = 1;
}

message DeleteEventResponse {}

message ListEventsByTaskRequest {
  int64 task_id = 1;
  int32 page_size = 2;    // Max events per page (default 50, max 200). 0 with an empty
                          // page_token selects the legacy unpaged path (all events, ascending).
  string page_token = 3;  // Opaque bidirectional cursor (encodes a boundary id + direction).
                          // Empty returns the newest page.
  repeated string types = 4;  // Event-type filter (e.g. "instruction", "external"); empty = all types.
                              // Values match the payload arm names / db `type` column.
}

message ListEventsByTaskResponse {
  repeated Event events = 1;   // Always oldest-first (ascending id), every page and path.
  string prev_page_token = 2;  // Older page (scroll back); empty when history is exhausted.
  string next_page_token = 3;  // Newer page (scroll forward / live-follow); ALWAYS populated in
                               // the paged path so a client can keep polling the tail for appends.
  bool more = 4;               // Whether another page exists beyond `events` in the direction just
                               // walked (older for a prev_page_token request, newer for live-follow).
                               // Break on !more instead of the shorter-than-page_size heuristic, which
                               // misfires at an exact page_size boundary. Always false on the legacy
                               // unpaged path, which returns the whole stream.
}

message RunnerEvent {
  int64 task_id = 1;
  string event = 2;     // "started", "stopped", "failed"
  int64 version = 3;    // Current version, or 0 for bypass
  bool reconcile = 4;   // True if from reconciliation, not real-time
  string reason = 5;    // Optional human-readable detail (failure reason, etc.)
}

message SubmitRunnerEventsRequest {
  repeated RunnerEvent events = 1;
}

message SubmitRunnerEventsResponse {}

