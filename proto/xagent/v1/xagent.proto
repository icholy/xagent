syntax = "proto3";

package xagent.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/icholy/xagent/internal/proto/xagent/v1;xagentv1";

service XAgentService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc ListRunnerTasks(ListRunnerTasksRequest) returns (ListRunnerTasksResponse);
  rpc ListChildTasks(ListChildTasksRequest) returns (ListChildTasksResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc GetTaskDetails(GetTaskDetailsRequest) returns (GetTaskDetailsResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc ArchiveTask(ArchiveTaskRequest) returns (ArchiveTaskResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc RestartTask(RestartTaskRequest) returns (RestartTaskResponse);
  rpc UploadLogs(UploadLogsRequest) returns (UploadLogsResponse);
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse);
  rpc CreateLink(CreateLinkRequest) returns (CreateLinkResponse);
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse);
  rpc FindLinksByURL(FindLinksByURLRequest) returns (FindLinksByURLResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  rpc AddEventTask(AddEventTaskRequest) returns (AddEventTaskResponse);
  rpc RemoveEventTask(RemoveEventTaskRequest) returns (RemoveEventTaskResponse);
  rpc ListEventTasks(ListEventTasksRequest) returns (ListEventTasksResponse);
  rpc ListEventsByTask(ListEventsByTaskRequest) returns (ListEventsByTaskResponse);
  rpc ProcessEvent(ProcessEventRequest) returns (ProcessEventResponse);
  rpc SubmitRunnerEvents(SubmitRunnerEventsRequest) returns (SubmitRunnerEventsResponse);
  rpc RegisterWorkspaces(RegisterWorkspacesRequest) returns (RegisterWorkspacesResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc ClearWorkspaces(ClearWorkspacesRequest) returns (ClearWorkspacesResponse);
}

message PingRequest {}

message PingResponse {}

message Instruction {
  string text = 1;
  string url = 2;
}

message Task {
  int64 id = 1;
  string name = 2;
  int64 parent = 3;
  string workspace = 4;
  string runner = 5;  // Runner ID that handles this task
  repeated Instruction instructions = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string command = 10;  // "restart", "stop", or empty
  int64 version = 11;  // Incremented when command changes
}

message McpServer {
  string name = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;
}

message Profile {
  string id = 1;
  string email = 2;
  string name = 3;
}

message GetProfileRequest {}

message GetProfileResponse {
  Profile profile = 1;
}

message ListTasksRequest {}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message ListRunnerTasksRequest {
  string runner = 1;  // Runner ID (required)
}

message ListRunnerTasksResponse {
  repeated Task tasks = 1;
}

message ListChildTasksRequest {
  int64 parent_id = 1;
}

message ListChildTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  string name = 1;
  int64 parent = 2;
  string workspace = 3;
  repeated Instruction instructions = 4;
  string runner = 5;  // Runner ID that should handle this task
}

message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  int64 id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message GetTaskDetailsRequest {
  int64 id = 1;
}

message GetTaskDetailsResponse {
  Task task = 1;
  repeated Task children = 2;
  repeated Event events = 3;
  repeated TaskLink links = 4;
}

message UpdateTaskRequest {
  int64 id = 1;
  string name = 2;
  reserved 3;  // Previously: restart
  repeated Instruction add_instructions = 4;
  bool start = 5;    // Start after current run finishes (non-interrupting)
}

message UpdateTaskResponse {}

message DeleteTaskRequest {
  int64 id = 1;
}

message DeleteTaskResponse {}

message ArchiveTaskRequest {
  int64 id = 1;
}

message ArchiveTaskResponse {}

message CancelTaskRequest {
  int64 id = 1;
}

message CancelTaskResponse {}

message RestartTaskRequest {
  int64 id = 1;
}

message RestartTaskResponse {}

message LogEntry {
  string type = 1;
  string content = 2;
  google.protobuf.Timestamp created_at = 3;
}

message UploadLogsRequest {
  int64 task_id = 1;
  repeated LogEntry entries = 2;
}

message UploadLogsResponse {}

message ListLogsRequest {
  int64 task_id = 1;
}

message ListLogsResponse {
  repeated LogEntry entries = 1;
}

message TaskLink {
  int64 id = 1;
  int64 task_id = 2;
  string relevance = 3;
  string url = 4;
  string title = 5;
  bool notify = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateLinkRequest {
  int64 task_id = 1;
  string relevance = 2;
  string url = 3;
  string title = 4;
  bool notify = 5;
}

message CreateLinkResponse {
  TaskLink link = 1;
}

message ListLinksRequest {
  int64 task_id = 1;
}

message ListLinksResponse {
  repeated TaskLink links = 1;
}

message FindLinksByURLRequest {
  string url = 1;
}

message FindLinksByURLResponse {
  repeated TaskLink links = 1;
}

message Event {
  int64 id = 1;
  string description = 2;
  string data = 3;
  string url = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ListEventsRequest {
  int32 limit = 1;  // Max events to return (default: 100, max: 100)
}

message ListEventsResponse {
  repeated Event events = 1;
}

message CreateEventRequest {
  string description = 1;
  string data = 2;
  string url = 3;
}

message CreateEventResponse {
  Event event = 1;
}

message GetEventRequest {
  int64 id = 1;
}

message GetEventResponse {
  Event event = 1;
}

message DeleteEventRequest {
  int64 id = 1;
}

message DeleteEventResponse {}

message AddEventTaskRequest {
  int64 event_id = 1;
  int64 task_id = 2;
}

message AddEventTaskResponse {}

message RemoveEventTaskRequest {
  int64 event_id = 1;
  int64 task_id = 2;
}

message RemoveEventTaskResponse {}

message ListEventTasksRequest {
  int64 event_id = 1;
}

message ListEventTasksResponse {
  repeated int64 task_ids = 1;
}

message ListEventsByTaskRequest {
  int64 task_id = 1;
}

message ListEventsByTaskResponse {
  repeated Event events = 1;
}

message ProcessEventRequest {
  int64 id = 1;
}

message ProcessEventResponse {
  repeated int64 task_ids = 1;
}

message RunnerEvent {
  int64 task_id = 1;
  string event = 2;     // "started", "stopped", "failed"
  int64 version = 3;    // Current version, or 0 for bypass
  bool reconcile = 4;   // True if from reconciliation, not real-time
}

message SubmitRunnerEventsRequest {
  repeated RunnerEvent events = 1;
}

message SubmitRunnerEventsResponse {}

message RegisteredWorkspace {
  string name = 1;
  string runner_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message RegisterWorkspacesRequest {
  string runner_id = 1;
  repeated RegisteredWorkspace workspaces = 2;
}

message RegisterWorkspacesResponse {}

message ListWorkspacesRequest {}

message ListWorkspacesResponse {
  repeated RegisteredWorkspace workspaces = 1;
}

message ClearWorkspacesRequest {
  string runner_id = 1;  // Optional: clear only workspaces for this runner
}

message ClearWorkspacesResponse {}
