syntax = "proto3";

package xagent.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/icholy/xagent/internal/proto/xagent/v1;xagentv1";

service XAgentService {
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc UploadLogs(UploadLogsRequest) returns (UploadLogsResponse);
  rpc CreateLink(CreateLinkRequest) returns (CreateLinkResponse);
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse);
  rpc FindLinksByURL(FindLinksByURLRequest) returns (FindLinksByURLResponse);
}

message Instruction {
  string text = 1;
  string url = 2;
}

message Task {
  string id = 1;
  string name = 2;
  string workspace = 3;
  repeated Instruction instructions = 4;
  string status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message McpServer {
  string name = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;
}

message ListTasksRequest {
  repeated string statuses = 1;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  string id = 1;
  string name = 2;
  string workspace = 3;
  repeated Instruction instructions = 4;
}

message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message UpdateTaskRequest {
  string id = 1;
  string name = 2;
  string status = 3;
  repeated Instruction add_instructions = 4;
}

message UpdateTaskResponse {}

message DeleteTaskRequest {
  string id = 1;
}

message DeleteTaskResponse {}

message LogEntry {
  string type = 1;
  string content = 2;
}

message UploadLogsRequest {
  string task_id = 1;
  repeated LogEntry entries = 2;
}

message UploadLogsResponse {}

message TaskLink {
  int64 id = 1;
  string task_id = 2;
  string relevance = 3;
  string url = 4;
  string title = 5;
  google.protobuf.Timestamp created_at = 6;
  bool created = 7;
}

message CreateLinkRequest {
  string task_id = 1;
  string relevance = 2;
  string url = 3;
  string title = 4;
  bool created = 5;
}

message CreateLinkResponse {
  TaskLink link = 1;
}

message ListLinksRequest {
  string task_id = 1;
}

message ListLinksResponse {
  repeated TaskLink links = 1;
}

message FindLinksByURLRequest {
  string url = 1;
}

message FindLinksByURLResponse {
  repeated TaskLink links = 1;
}
