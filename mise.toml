[settings]
pin=true

[tools]
node = "25.5.0"
go = "1.26.1"
sops = "3.11.0"
age = "1.3.1"
pnpm = "10.28.2"
flyctl = "0.4.6"

[tasks.build]
description = "Build xagent binaries for all architectures"
run = [
	"cd webui && pnpm install --frozen-lockfile && pnpm exec vite build",
	"CGO_ENABLED=0 go build -o xagent ./cmd/xagent",
	"mkdir -p prebuilt",
	"CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o prebuilt/xagent-linux-amd64 ./cmd/xagent",
	"CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o prebuilt/xagent-linux-arm64 ./cmd/xagent",
]

[tasks.dev]
description = "Start a local server in Docker"
run = "docker compose -f docker-compose.dev.yml up"

[tasks.install]
description = "Build and install xagent bin"
run = [
	"cd webui && pnpm install --frozen-lockfile && pnpm exec vite build",
	"CGO_ENABLED=0 go build -o $(go env GOPATH)/bin/xagent ./cmd/xagent",
]

[tasks.generate]
description = "Generate code from proto files and sqlc"
run = [
	"go generate ./...",
	"cd webui && pnpm install --frozen-lockfile && pnpm run generate",
]

[tasks.env]
description = "Decrypt secrets.yml to .env"
run = "sops -d --output-type dotenv sops.env.yml > .env"

[tasks."up:test"]
description = "Start postgres via docker compose"
run = "docker compose -f docker-compose.test.yml up -d --wait postgres"

[tasks.migrate]
description = "Run database migrations"
env = { DATABASE_URL = "postgres://xagent:xagent@localhost:5433/xagent?sslmode=disable" }
run = "go run ./cmd/migrate"

[tasks.test]
description = "Run tests"
depends = ["migrate"]
env = { TEST_DATABASE_URL = "postgres://xagent:xagent@localhost:5433/xagent?sslmode=disable" }
run = "go test ./..."

[tasks.deploy]
description = "Build and deploy to Fly.io"
run = "fly deploy"

[tasks.update_secrets]
run = "sops -d --output-type dotenv sops.env.yml | fly secrets import"

[tasks.psql]
description = "Connect to the local database"
run = "psql postgres://xagent:xagent@localhost:5433/xagent?sslmode=disable"

[tasks.logs]
description = "View production logs"
run = "flyctl logs -a xagent"

[tasks.diagrams]
description = "Render d2 diagrams to images/"
run = [
	"d2 images/schema.d2",
	"d2 images/architecture.d2",
]

[tasks.localhost_run]
description = "Use localhost.run to expose the vite proxy to the web"
run = "ssh -R 80:localhost:5173 nokey@localhost.run"
