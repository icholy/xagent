[tools]
sops = "latest"
terraform = "latest"
age = "latest"
pnpm = "latest"

[tasks.build]
description = "Build xagent binaries for all architectures and webhook"
run = [
	"cd webui && pnpm install --frozen-lockfile && pnpm exec vite build",
	"go build -o xagent ./cmd/xagent",
	"mkdir -p prebuilt",
	"CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o prebuilt/xagent-linux-amd64 ./cmd/xagent",
	"CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o prebuilt/xagent-linux-arm64 ./cmd/xagent",
	"mkdir -p webhook",
	"CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o webhook/bootstrap ./cmd/webhook"
]

[tasks.generate]
description = "Generate code from proto files and sqlc"
run = [
	"go tool buf generate",
	"go tool sqlc generate",
	"cd webui && pnpm install --frozen-lockfile && pnpm run generate",
	"go generate ./..."
]

[tasks.wipe]
description = "Delete the database"
run = "rm -rf ./data/xagent.db*"
