app = "xagent"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"
  build-target = "server"

[env]
  # Set these secrets via `fly secrets set`:
  # XAGENT_BASE_URL
  # XAGENT_DATABASE_URL
  # XAGENT_AUTH_DOMAIN
  # XAGENT_AUTH_CLIENT_ID
  # XAGENT_AUTH_CLIENT_SECRET
  # XAGENT_AUTH_DEVICE_CLIENT_ID
  # XAGENT_AUTH_ENCRYPTION_KEY

[http_service]
  internal_port = 6464
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Must stay at 1: the notification system uses in-process pubsub, so a second
  # machine would miss notifications published on the other (publish on machine
  # A never reaches subscribers on machine B). Do NOT scale this up until the
  # pubsub is distributed (e.g. Postgres LISTEN/NOTIFY).
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
