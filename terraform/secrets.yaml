# SOPS encrypted secrets file
# To encrypt this file, run:
#   sops --encrypt --age <your-age-public-key> secrets.yaml > secrets.yaml.enc
#   mv secrets.yaml.enc secrets.yaml
#
# To edit encrypted secrets:
#   sops secrets.yaml
#
# Example with AWS KMS:
#   sops --encrypt --kms arn:aws:kms:us-east-1:123456789:key/your-key-id secrets.yaml

# GitHub webhook secret for signature verification
github_webhook_secret: "REPLACE_ME_WITH_ACTUAL_SECRET"

# Jira webhook secret for signature verification
jira_webhook_secret: "REPLACE_ME_WITH_ACTUAL_SECRET"

# Jira instance base URL
jira_base_url: "https://your-domain.atlassian.net"
