version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/sql/queries/"
    schema: "internal/store/sql/migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/store/sqlc"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
