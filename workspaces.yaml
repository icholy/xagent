workspaces:
  default:
    acp:
      command: ["npx", "@zed-industries/claude-code-acp"]
      claude_resume_hack: true
    container:
      image: node:alpine
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: ${env:CLAUDE_CODE_OAUTH_TOKEN}
    commands:
      - git clone https://github.com/icholy/gomajor

  gomajor:
    acp:
      command: ["npx", "@zed-industries/claude-code-acp"]
      claude_resume_hack: true
      cwd: /home/vscode/gomajor
    commands:
      - git clone https://github.com/icholy/gomajor
    container:
      image: containeragent
      working_dir: /home/vscode
      volumes:
        - credentials:/mnt/credentials
        - /var/run/docker.sock:/var/run/docker.sock
      networks:
        - metamcp_metamcp-network
      group_add:
        - "${sh:getent group docker | cut -d: -f3}"
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: ${env:CLAUDE_CODE_OAUTH_TOKEN}
    mcp_servers:
      meta:
        type: "http"
        url: "http://metamcp:12008/metamcp/Default/mcp"
        headers:
          Authorization: "Bearer ${env:METAMCP_API_KEY}"

