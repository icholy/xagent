workspaces:
  default:
    container:
      image: node:alpine
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: ${env:CLAUDE_CODE_OAUTH_TOKEN}
    commands:
      - git clone git@github.com:icholy/llmpatch.git

  gomajor:
    commands:
      - git clone git@github.com:icholy/llmpatch.git
    container:
      image: containeragent
      working_dir: /home/vscode
      volumes:
        - credentials:/mnt/credentials
        - /var/run/docker.sock:/var/run/docker.sock
      networks:
        - metamcp_metamcp-network
      group_add:
        - "${sh:getent group docker | cut -d: -f3}"
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: ${env:CLAUDE_CODE_OAUTH_TOKEN}
    agent:
      cwd: /home/vscode/llmpatch
      mcp_servers:
        meta:
          type: "http"
          url: "http://metamcp:12008/metamcp/Default/mcp"
          headers:
            Authorization: "Bearer ${env:METAMCP_API_KEY}"

  cdl:
    commands:
      - git clone --no-hardlinks /repo /home/vscode/cdl
      - git -C /home/vscode/cdl remote set-url origin git@github.com:Compass-Digital-Engineering/core-eng-mono.git
      - git -C /home/vscode/cdl switch -c task-$XAGENT_TASK_ID
    container:
      image: containeragent
      working_dir: /home/vscode
      user: "${sh:id -u}:${sh:id -g}"
      volumes:
        - credentials:/mnt/credentials
        - /var/run/docker.sock:/var/run/docker.sock
        - /home/icholy/src/github.com/compassdigital/cdl:/repo:ro
      networks:
        - metamcp_metamcp-network
      group_add:
        - "${sh:getent group docker | cut -d: -f3}"
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: ${env:CLAUDE_CODE_OAUTH_TOKEN}
    agent:
      cwd: /home/vscode/cdl
      mcp_servers:
        meta:
          type: "http"
          url: "http://metamcp:12008/metamcp/Default/mcp"
          headers:
            Authorization: "Bearer ${env:METAMCP_API_KEY}"
  xagent:
    commands:
      - git clone git@github.com:icholy/xagent.git
      - mise trust -y /home/vscode/xagent/mise.toml
      - |
        cat > /home/vscode/xagent/.git/hooks/commit-msg << 'EOF'
        #!/bin/sh
        if grep -qE "🤖 Generated with|Co-Authored-By" "$1"; then
          echo "ERROR: Never add attribution or credit lines to commits or PRs. This means:"
          echo "- Do NOT add \"Co-Authored-By:\" lines in commit messages"
          echo "- Do NOT add \"🤖 Generated with Claude Code\" or similar attribution"
          echo "- Do NOT mention yourself, Claude, or AI in commits/PRs"
          echo "- Keep commit messages focused on the technical changes only"
          exit 1
        fi
        EOF
        chmod +x /home/vscode/xagent/.git/hooks/commit-msg
    container:
      image: containeragent
      working_dir: /home/vscode
      user: "${sh:id -u}:${sh:id -g}"
      volumes:
        - credentials:/mnt/credentials
        - /var/run/docker.sock:/var/run/docker.sock
      networks:
        - metamcp_metamcp-network
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: ${env:CLAUDE_CODE_OAUTH_TOKEN}
    agent:
      cwd: /home/vscode/xagent
      mcp_servers:
        meta:
          type: "http"
          url: "http://metamcp:12008/metamcp/Default/mcp"
          headers:
            Authorization: "Bearer ${env:METAMCP_API_KEY}"
      prompt: |
        You have the xagent repo cloned locally. When asked to make code changes, you should open a PR.

        IMPORTANT: All git commits must use the following author information:
        - Name: Ilia Choly
        - Email: ilia.choly@gmail.com

        Before making any commits, ensure git is configured with:
        git config user.name "Ilia Choly"
        git config user.email "ilia.choly@gmail.com"

        IMPORTANT: Never add attribution or credit lines to commits or PRs. This means:
        - Do NOT add "Co-Authored-By:" lines in commit messages
        - Do NOT add "🤖 Generated with Claude Code" or similar attribution
        - Do NOT mention yourself, Claude, or AI in commits/PRs
        - Keep commit messages focused on the technical changes only


