{{if .Children}}
<div id="task-children" class="card">
<h3>Child Tasks</h3>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Workspace</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {{range .Children}}
        {{template "task-row.html" .}}
        {{end}}
    </tbody>
</table>
</div>
{{else}}
<div id="task-children"></div>
{{end}}
