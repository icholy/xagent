<div id="task-logs">
{{if .Logs}}
<table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Content</th>
        </tr>
    </thead>
    <tbody>
    {{range .Logs}}
        <tr>
            <td>{{.CreatedAt.Format "15:04:05"}}</td>
            <td><span class="status status-{{if eq .Type "error"}}failed{{else}}running{{end}}">{{.Type}}</span></td>
            <td>{{.Content}}</td>
        </tr>
    {{end}}
    </tbody>
</table>
{{else}}
<p>No logs yet.</p>
{{end}}
</div>
