workspaces:
  dummy:
    description: Dummy workspace for exercising the local dev stack
    container:
      image: alpine:3.21
      # Join the dev compose network so the task container can reach the
      # server by its service name (see docker-compose.dev.yml).
      networks:
        - xagent-dev
    agent:
      type: dummy
      dummy:
        # Call the `report` tool on the injected `xagent` agent MCP so the
        # message shows up in the Web UI — exercises the agent MCP end-to-end.
        tool_calls:
          - server: xagent
            name: report
            arguments:
              message: hello from the dummy agent
        sleep: 2
  dummy-error:
    description: Dummy workspace whose agent errors out — exercises failure handling
    container:
      image: alpine:3.21
      # Join the dev compose network so the task container can reach the
      # server by its service name (see docker-compose.dev.yml).
      networks:
        - xagent-dev
    agent:
      type: dummy
      dummy:
        # Return an error so the agent reports a failure.
        error: dummy agent failed on purpose
