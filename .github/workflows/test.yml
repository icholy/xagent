name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: xagent
          POSTGRES_PASSWORD: xagent
          POSTGRES_DB: xagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Create placeholder index.html for go:embed
        run: mkdir -p internal/server/webui && echo '<!DOCTYPE html><html><body>placeholder</body></html>' > internal/server/webui/index.html

      - name: Download dependencies
        run: go mod download

      - name: Build prebuilt binaries for runner tests
        run: |
          mkdir -p prebuilt
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o prebuilt/xagent-linux-amd64 ./cmd/xagent

      - name: Pull Docker images for runner tests
        run: docker pull alpine:latest

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://xagent:xagent@localhost:5432/xagent?sslmode=disable
        run: go test -v ./...

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Build webui
        run: pnpm install --frozen-lockfile && pnpm run build
        working-directory: webui
