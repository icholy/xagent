name: Tests

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '.release-please-manifest.json'
      - 'images/**'
      - 'n8n-node/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '.release-please-manifest.json'
      - 'images/**'
      - 'n8n-node/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: xagent
          POSTGRES_PASSWORD: xagent
          POSTGRES_DB: xagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Create placeholder index.html for go:embed
        run: mkdir -p internal/server/webui && echo '<!DOCTYPE html><html><body>placeholder</body></html>' > internal/server/webui/index.html

      - name: Download dependencies
        run: go mod download

      - name: Build prebuilt binaries for runner tests
        run: |
          mkdir -p prebuilt
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o prebuilt/xagent-linux-amd64 ./cmd/xagent

      - name: Run migrations
        env:
          DATABASE_URL: postgres://xagent:xagent@localhost:5432/xagent?sslmode=disable
        run: go run ./cmd/migrate

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://xagent:xagent@localhost:5432/xagent?sslmode=disable
        run: go test -v ./...
