name: Web UI

on:
  push:
    branches: [ master ]
    paths:
      - 'webui/**'
      - 'mise.toml'
      - '.github/workflows/webui.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'webui/**'
      - 'mise.toml'
      - '.github/workflows/webui.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Build webui
        run: pnpm install --frozen-lockfile && pnpm run build
        working-directory: webui
