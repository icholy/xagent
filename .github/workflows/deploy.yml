name: Deploy

on:
  workflow_run:
    workflows: [ Release ]
    types: [ completed ]
    branches: [ master ]

permissions:
  contents: read
  deployments: write

jobs:
  check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true
      - id: tag
        run: |
          tag=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ -z "$tag" ]; then
            echo "::notice::No tag at ${GITHUB_SHA}, skipping deploy"
          else
            echo "::notice::Deploying $tag"
          fi

  deploy:
    needs: check
    if: needs.check.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production
          ref: ${{ needs.check.outputs.tag }}
          desc: Deploying ${{ needs.check.outputs.tag }} to Fly.io

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: flyctl deploy --image ghcr.io/${{ github.repository }}-server:${TAG#v}

      - uses: bobheadxi/deployments@v1
        if: always()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env_url: https://xagent.choly.ca
